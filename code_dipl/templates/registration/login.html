{% extends 'base.html' %}

{% block title %}🔐 Вход — Мостоотряд-69{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h5 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Вход в систему</h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> 
                        Неправильный логин или пароль
                    </div>
                    {% endif %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Логин</label>
                        <input type="text" name="username" id="id_username" 
                               class="form-control form-control-lg" required autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" 
                               class="form-control form-control-lg" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                </form>
                
                <p class="text-center text-muted small mt-3 mb-0">
                    Доступ только для сотрудников ООО "МОСТООТРЯД-69"
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
